- type: entity
  parent: BoxCardboard
  id: BoxTapeRecorder
  name: tape recorder box
  description: A cardboard box containing a tape recorder and four blank cassette tapes.
  components:
  - type: EntityTableContainerFill
    containers:
      storagebase: !type:AllSelector
        children:
        - id: TapeRecorder
        - id: TapeCassetteOneMinute
          amount: 4
  - type: Sprite
    layers:
    - state: box
    - state: writing

