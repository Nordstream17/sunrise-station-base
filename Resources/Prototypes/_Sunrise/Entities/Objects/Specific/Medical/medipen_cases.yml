- type: entity
  name: Medipen case
  description: A small medipen case. Saves a lot of space!
  parent: BaseStorageItem
  id: MedipenCaseBase
  abstract: true
  components:
  - type: Sprite
    layers:
      - map: [ base ]
        state: icon
  - type: Storage
    whitelist:
      components:
        - Injector
    grid:
    - 0,0,2,1
  - type: Item
    size: Small
    shape:
    - 0,0,1,0
    storedOffset: 0,1
  - type: PhysicalComposition
    materialComposition:
      Plastic: 150
  - type: Tag
    tags:
    - Medkit
  - type: GenericVisualizer
    visuals:
      enum.StorageVisuals.Open:
        base:
          True: { state: icon-open }
          False: { state: icon }
  - type: Appearance

- type: entity
  name: medipen case
  description: A small medipen case. Saves a lot of space!
  parent: MedipenCaseBase
  id: MedipenCaseBlueShield
  suffix: Blue Shield Officier
  components:
  - type: Sprite
    sprite: _Sunrise/Entities/Objects/Specific/Medical/MedipenCases/blue_shield_officer.rsi
    state: icon
  - type: Item
    sprite: _Sunrise/Entities/Objects/Specific/Medical/MedipenCases/blue_shield_officer.rsi
  - type: Storage
    whitelist:
      components:
        - Injector
    grid:
    - 0,0,3,1

