- type: entity
  id: JapaneseLantern
  name: Japanese lantern
  description: "An elegant stone lantern."
  suffix: Always Powered
  parent: BaseStructure
  components:
  - type: Sprite
    sprite: _Sunrise/Structures/Lighting/japanese_lantern.rsi
    snapCardinals: true
    drawdepth: Objects
    noRot: true
    layers:
    - map: ["enum.PoweredLightLayers.Base"]
      state: base
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.17,-0.30,0.17,0.25"
        density: 190
        mask:
        - MachineMask
        layer:
        - MidImpassable
        - LowImpassable
        - BulletImpassable
  - type: PointLight
    radius: 4
    energy: 2.5
    softness: 0.9
    color: "#FFAF38"
  - type: Anchorable
  - type: InteractionOutline
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 200
      behaviors:
        - !type:DoActsBehavior
          acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:SpawnEntitiesBehavior
        spawn:
          SheetSteel1:
            min: 2
            max: 4
      - !type:EmptyAllContainersBehaviour
      - !type:PlaySoundBehavior
        sound:
          collection: MetalGlassBreak
  - type: StaticPrice
    price: 75
  - type: RequireProjectileTarget

- type: entity
  id: JapaneseLanternSmall
  name: Small Japanese lantern
  description: "An elegant stone lantern."
  suffix: Always Powered
  parent: JapaneseLantern
  components:
  - type: Sprite
    sprite: _Sunrise/Structures/Lighting/japanese_lantern_small.rsi
    snapCardinals: true
    drawdepth: Objects
    noRot: true
    layers:
    - map: ["enum.PoweredLightLayers.Base"]
      state: base




- type: entity
  id: PoweredJapaneseLantern
  name: Japanese lantern
  description: "An elegant stone lantern."
  suffix: ""
  parent: JapaneseLantern
  components:
  - type: AmbientOnPowered
  - type: PoweredLightVisuals
    blinkingSound:
      path: "/Audio/Machines/light_tube_on.ogg"
    spriteStateMap:
      off: base
      on: base
  - type: Electrified
    enabled: false
    usesApcPower: true
  - type: LitOnPowered
  - type: ApcPowerReceiver
    powerLoad: 200
  - type: ExtensionCableReceiver
  - type: Appearance

- type: entity
  id: PoweredJapaneseLanternSmall
  name: Small Japanese lantern
  description: "An elegant stone lantern."
  suffix: ""
  parent: JapaneseLanternSmall
  components:
  - type: AmbientOnPowered
  - type: PoweredLightVisuals
    blinkingSound:
      path: "/Audio/Machines/light_tube_on.ogg"
    spriteStateMap:
      off: base
      on: base
  - type: Electrified
    enabled: false
    usesApcPower: true
  - type: LitOnPowered
  - type: ApcPowerReceiver
    powerLoad: 200
  - type: ExtensionCableReceiver
  - type: Appearance

