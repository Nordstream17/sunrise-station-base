- type: marking
  id: FoxEars
  bodyPart: HeadTop
  markingCategory: HeadTop
  speciesRestriction: [Human]
  sponsorOnly: false
  sprites:
  - sprite: _Sunrise/Mobs/Customization/fox_parts.rsi
    state: ears_fox_outer
  - sprite: _Sunrise/Mobs/Customization/fox_parts.rsi
    state: ears_fox_inner

- type: marking
  id: RabbitEars
  bodyPart: HeadTop
  markingCategory: HeadTop
  speciesRestriction: [Human]
  sponsorOnly: false
